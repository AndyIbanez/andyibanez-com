<section class="max-w-2xl mx-auto px-4 py-12">
  <div class="bg-white dark:bg-gray-900 shadow-xl rounded-xl p-8 space-y-8 border border-gray-200 dark:border-gray-700">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Contact Me</h2>
    <p class="text-gray-600 dark:text-gray-300">Got a question or want to work together? Just fill out the form below.</p>

    <form action="https://api.web3forms.com/submit" method="POST" accept-charset="UTF-8" class="space-y-6" novalidate>
      <input type="hidden" name="access_key" value="da9f396d-124c-46e8-9f02-3b36343eab36">
      <input type="hidden" name="subject" value="New inquiry from andyibanez.com">
      <input type="hidden" name="redirect" value="https://www.andyibanez.com/contact/thank-you/">

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Name</label>
        <input type="text" name="name" required autocomplete="name"
          class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-base p-3">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email</label>
        <input type="email" name="email" required autocomplete="email"
          class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-base p-3">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Type of Inquiry</label>
        <select name="inquiry_type" required
          class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-base p-3">
          <option value="Contracting">Contracting</option>
          <option value="Sponsorship">Sponsorship</option>
          <option value="Something Else">Something Else</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Message</label>
        <textarea name="message" rows="6" required
          class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-base p-3"></textarea>
      </div>

      <!-- Honeypot -->
      <input type="text" name="website" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px">

      <div>
        <button type="submit"
          class="w-full sm:w-auto px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-full shadow-lg transition transform hover:scale-105">
          <strong>Send Message</strong>
        </button>
      </div>
    </form>
  </div>
</section>
